<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cloud Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c14;
    --surface: #0e1523;
    --surface2: #141d2e;
    --border: rgba(99,179,255,0.12);
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --glow: rgba(59,130,246,0.25);
    --text: #e8edf5;
    --muted: #7a90b0;
    --radius: 16px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── ANIMATED BACKGROUND MESH ──────────────────── */
  .bg-mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-mesh::before, .bg-mesh::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .bg-mesh::before {
    width: 700px; height: 700px;
    background: radial-gradient(circle, #1d4ed8, transparent 70%);
    top: -200px; left: -200px;
  }
  .bg-mesh::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #0ea5e9, transparent 70%);
    bottom: -150px; right: -150px;
    animation-delay: -9s;
    animation-duration: 22s;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(60px, 40px) scale(1.15); }
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 40px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(8,12,20,0.75);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    animation: slideDown 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo span { color: var(--accent); -webkit-text-fill-color: var(--accent2); }
  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.5); opacity: 0.6; }
  }

  /* ── HERO ───────────────────────────────────────── */
  .hero {
    position: relative;
    z-index: 1;
    padding: 100px 40px 80px;
    text-align: center;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }
  @keyframes fadeUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .hero-eyebrow {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
    font-weight: 600;
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(42px, 7vw, 80px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -2px;
    background: linear-gradient(160deg, #fff 40%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 18px;
  }
  .hero p {
    font-size: 17px;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
    font-style: italic;
  }

  /* ── CONTAINER ──────────────────────────────────── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 24px 100px;
  }

  /* ── COMPOSE CARD ───────────────────────────────── */
  .compose-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 64px;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.4s both;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .compose-card:hover {
    border-color: rgba(99,179,255,0.28);
    box-shadow: 0 0 40px var(--glow);
  }
  .compose-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
  }
  .compose-card h2::before {
    content: '';
    width: 4px; height: 20px;
    border-radius: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
    margin-top: 18px;
  }
  label:first-of-type { margin-top: 0; }

  input[type="text"],
  input[type="file"],
  textarea {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    resize: vertical;
  }
  input[type="text"]:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  input[type="file"] { cursor: pointer; }

  .btn-publish {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    margin-top: 22px;
    padding: 14px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-publish::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn-publish:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.4); }
  .btn-publish:hover::after { opacity: 1; }
  .btn-publish:active { transform: translateY(0); }
  .btn-publish.loading { opacity: 0.7; pointer-events: none; }
  .btn-publish .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-publish.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SECTION HEADING ────────────────────────────── */
  .section-heading {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── POST CARD ──────────────────────────────────── */
  .post {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 32px;
    /* scroll reveal state */
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 0.65s cubic-bezier(0.16,1,0.3,1),
                transform 0.65s cubic-bezier(0.16,1,0.3,1),
                border-color 0.3s,
                box-shadow 0.3s;
  }
  .post.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .post:hover {
    border-color: rgba(99,179,255,0.28);
    box-shadow: 0 8px 48px rgba(0,0,0,0.4), 0 0 30px var(--glow);
  }

  .post-image-wrap {
    position: relative;
    overflow: hidden;
    max-height: 360px;
  }
  .post-image-wrap img {
    width: 100%;
    height: 360px;
    object-fit: cover;
    display: block;
    transition: transform 0.7s cubic-bezier(0.16,1,0.3,1);
  }
  .post:hover .post-image-wrap img {
    transform: scale(1.04);
  }
  /* subtle shimmer overlay on image */
  .post-image-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 50%,
      rgba(8,12,20,0.7) 100%
    );
    pointer-events: none;
  }

  .post-content {
    padding: 24px 28px 28px;
  }
  .post-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .post-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(59,130,246,0.12);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(59,130,246,0.25);
  }
  .post-date {
    font-size: 13px;
    color: var(--muted);
  }
  .post-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 10px;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .post-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--muted);
  }
  .post-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .read-btn {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: gap 0.2s;
  }
  .read-btn:hover { gap: 10px; }
  .read-btn svg { width: 14px; height: 14px; }

  /* ── EMPTY STATE ────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    animation: fadeUp 0.6s both;
  }
  .empty-state .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .empty-state p { font-size: 15px; }

  /* ── TOAST ──────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    padding: 14px 22px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9998;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    pointer-events: none;
    max-width: 300px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
  .toast.error   { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }

  /* ── SCROLL TO TOP ──────────────────────────────── */
  .scroll-top {
    position: fixed;
    bottom: 32px;
    left: 32px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    z-index: 9998;
  }
  .scroll-top.show { opacity: 1; transform: translateY(0); }
  .scroll-top:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 16px var(--glow); }

  /* ── PROGRESS BAR ───────────────────────────────── */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #2563eb, #60a5fa, #38bdf8);
    z-index: 9999;
    transition: width 0.1s;
    box-shadow: 0 0 8px rgba(59,130,246,0.6);
  }

  @media (max-width: 600px) {
    header { padding: 0 20px; }
    .hero { padding: 70px 20px 50px; }
    .compose-card { padding: 24px; }
    .post-title { font-size: 18px; }
    .post-content { padding: 18px 20px 20px; }
  }
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="progress-bar" id="progressBar"></div>

<!-- HEADER -->
<header>
  <div class="logo">Cloud<span>Blog</span></div>
  <div class="header-dot"></div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">✦ Personal Writing Space</div>
  <h1>My Cloud<br>Blog</h1>
  <p>A space to share thoughts, stories, and ideas — stored in the cloud.</p>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- CREATE POST -->
  <div class="compose-card">
    <h2>New Post</h2>
    <label>Title</label>
    <input type="text" id="title" placeholder="What's this post about?">
    <label>Content</label>
    <textarea id="content" rows="4" placeholder="Write something worth reading..."></textarea>
    <label>Image</label>
    <input type="file" id="imageInput" accept="image/*">
    <button class="btn-publish" id="publishBtn" onclick="submitPost()">
      <div class="spinner"></div>
      <span id="publishLabel">Publish Post</span>
    </button>
  </div>

  <!-- POSTS -->
  <div class="section-heading">Latest Posts</div>
  <div id="posts"></div>

</div>

<!-- UI EXTRAS -->
<div class="toast" id="toast"></div>
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</button>

<script>
const API = "https://csgg9gsuqj.execute-api.us-east-1.amazonaws.com/prod";

/* ── HELPERS ──────────────────────────────────── */
async function parseLambdaResponse(res) {
  const json = await res.json();
  if (json.body) return JSON.parse(json.body);
  return json;
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3200);
}

/* ── SCROLL PROGRESS BAR ───────────────────────── */
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const scrolled = doc.scrollTop / (doc.scrollHeight - doc.clientHeight);
  document.getElementById('progressBar').style.width = (scrolled * 100) + '%';

  const st = document.getElementById('scrollTop');
  doc.scrollTop > 400 ? st.classList.add('show') : st.classList.remove('show');
});

/* ── SCROLL REVEAL ─────────────────────────────── */
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      // staggered delay based on order
      const delay = parseInt(entry.target.dataset.index || 0) * 80;
      setTimeout(() => entry.target.classList.add('visible'), delay);
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

/* ── UPLOAD IMAGE ──────────────────────────────── */
async function uploadImage(file) {
  const res = await fetch(`${API}/upload-url`);
  if (!res.ok) throw new Error(`Failed to get upload URL: ${res.status}`);
  const data = await parseLambdaResponse(res);
  const uploadRes = await fetch(data.uploadUrl, {
    method: "PUT",
    headers: { "Content-Type": file.type },
    body: file
  });
  if (!uploadRes.ok) throw new Error(`Upload failed: ${uploadRes.status}`);
  return data.imageUrl;
}

/* ── SUBMIT POST ───────────────────────────────── */
async function submitPost() {
  const title   = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const imgFile = document.getElementById("imageInput").files[0];
  if (!title || !content || !imgFile) {
    showToast("Fill all fields and pick an image.", "error"); return;
  }
  const btn = document.getElementById('publishBtn');
  btn.classList.add('loading');
  document.getElementById('publishLabel').textContent = 'Publishing…';
  try {
    const imageUrl = await uploadImage(imgFile);
    const postRes = await fetch(`${API}/create-post`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, content, imageUrl })
    });
    if (!postRes.ok) throw new Error(`Post creation failed: ${postRes.status}`);
    showToast("Post published! ✓");
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    document.getElementById("imageInput").value = "";
    loadPosts();
  } catch (err) {
    console.error(err);
    showToast("Failed to publish. Check console.", "error");
  } finally {
    btn.classList.remove('loading');
    document.getElementById('publishLabel').textContent = 'Publish Post';
  }
}

/* ── LOAD POSTS ────────────────────────────────── */
async function loadPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><p>Loading posts…</p></div>`;
  try {
    const res = await fetch(`${API}/posts`);
    if (!res.ok) throw new Error(`Failed to load posts: ${res.status}`);
    const posts = await parseLambdaResponse(res);
    container.innerHTML = "";

    if (!posts.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">☁️</div>
          <p>No posts yet. Be the first to write something.</p>
        </div>`;
      return;
    }

    posts
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
      .forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'post';
        el.dataset.index = i;
        const date = new Date(p.createdAt).toLocaleDateString('en-GB', {
          year: 'numeric', month: 'short', day: 'numeric'
        });
        el.innerHTML = `
          <div class="post-image-wrap">
            <img src="${p.imageUrl}" alt="${p.title}" loading="lazy">
          </div>
          <div class="post-content">
            <div class="post-meta">
              <span class="post-tag">Cloud Post</span>
              <span class="post-date">${date}</span>
            </div>
            <div class="post-title">${p.title}</div>
            <div class="post-text">${p.content}</div>
            <div class="post-footer">
              <a href="#" class="read-btn" onclick="return false">
                Read More
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
              </a>
            </div>
          </div>`;
        container.appendChild(el);
        observer.observe(el);
      });
  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load posts.</p></div>`;
  }
}

loadPosts();
</script>
</body>
 
</html>
